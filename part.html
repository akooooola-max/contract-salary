<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>令和8年度 パートタイム職員 時給査定システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #1a5276; }
    header p { color: #666; font-size: 0.9rem; margin-top: 6px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a5276;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #d6eaf8;
    }

    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fafafa;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="number"]:focus {
      border-color: #2980b9;
      background: #fff;
    }

    .transport-detail { display: none; margin-top: 16px; }
    .transport-detail.active { display: block; }

    .transport-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-box {
      background: #eaf4fd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #1a5276;
      margin-top: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1a5276;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.05em;
    }

    .btn:hover { background: #154360; }

    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: #fff;
      color: #1a5276;
      font-size: 0.9rem;
      font-weight: 600;
      border: 2px solid #1a5276;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: #eaf4fd; }

    #result { display: none; }

    .result-total {
      text-align: center;
      padding: 24px 0 20px;
    }

    .result-total .label { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
    .result-total .amount { font-size: 2.6rem; font-weight: 800; color: #1a5276; }
    .result-total .sub { font-size: 0.85rem; color: #888; margin-top: 4px; }

    .result-sub-total {
      text-align: center;
      padding: 12px 0 16px;
      border-top: 1px dashed #eee;
      margin-top: 4px;
    }

    .result-sub-total .label { font-size: 0.85rem; color: #888; margin-bottom: 4px; }
    .result-sub-total .amount { font-size: 1.6rem; font-weight: 700; color: #555; }

    .breakdown {
      border-top: 1px solid #eee;
      margin-top: 20px;
      padding-top: 16px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px dashed #eee;
      font-size: 0.9rem;
    }

    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .key { color: #555; }
    .breakdown-row .val { font-weight: 600; color: #222; }
    .breakdown-row .val.plus { color: #1a8c4e; }
    .breakdown-row .val.transport { color: #7d3c98; }
    .breakdown-row .val.baseup { color: #c0392b; }
    .breakdown-row.total-row { font-weight: 700; font-size: 1rem; }
    .breakdown-row.monthly-row { font-weight: 700; font-size: 0.95rem; color: #1a5276; }

    .range-note {
      background: #fef9e7;
      border: 1px solid #f9e79f;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #7d6608;
      margin-top: 20px;
      line-height: 1.6;
    }

    @media print {
      @page { size: A4 portrait; margin: 14mm; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff; padding: 0; font-size: 10.5pt; }
      .container { max-width: 100%; }
      /* 入力フォーム・操作ボタンは印刷しない（結果のみ1枚に） */
      .card:not(#result) { display: none !important; }
      .btn, .btn-reset { display: none !important; }
      header { margin-bottom: 12px; }
      header h1 { font-size: 1.3rem; }
      #result {
        box-shadow: none;
        border: none;
        padding: 0;
        margin: 0;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .result-total { padding: 8px 0 12px; }
      .breakdown { margin-top: 12px; padding-top: 10px; }
      .breakdown-row { padding: 6px 0; }
      .range-note { margin-top: 12px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>令和8年度 パートタイム職員 時給査定システム</h1>
    <p>パートタイム職員 時給査定（経験加算なし）</p>
    <a href="index.html" style="display:inline-block; margin-top:12px; padding:7px 18px; background:#eaf4fd; color:#1a5276; border:1px solid #aed6f1; border-radius:20px; font-size:0.82rem; font-weight:600; text-decoration:none;">→ 契約職員 月給査定はこちら</a>
  </header>

  <!-- ① 基本情報 -->
  <div class="card">
    <h2>① 職種・資格区分</h2>

    <div class="form-group">
      <label for="jobType">職種・保有資格</label>
      <select id="jobType">
        <option value="">選択してください</option>
        <optgroup label="介護職員">
          <option value="kaigo_nq">介護職員　無資格</option>
          <option value="kaigo_shoninsha">介護職員　初任者研修</option>
          <option value="kaigo_jitsumu">介護職員　実務者研修</option>
          <option value="kaigo_fukushi">介護職員　介護福祉士</option>
        </optgroup>
        <optgroup label="児童系職員">
          <option value="jido_nq">児童系職員　無資格</option>
          <option value="jido_ninyo">児童系職員　任用資格</option>
          <option value="jido_kyoin">児童系職員　教職免許</option>
          <option value="jido_hoiku">児童系職員　保育士</option>
        </optgroup>
        <optgroup label="事務系職員">
          <option value="jimu_nq">事務系職員　未経験</option>
          <option value="jimu_3000">事務系職員　3,000円資格</option>
          <option value="jimu_5000">事務系職員　5,000円資格</option>
          <option value="jimu_10000">事務系職員　10,000円資格</option>
        </optgroup>
        <optgroup label="専門職・その他">
          <option value="rehab">リハビリ系職員</option>
          <option value="nurse">看護系職員</option>
          <option value="chori">福祉厨房調理師・世話人</option>
          <option value="shuro_hayaoso">就労　早出遅出等可能求人</option>
          <option value="shuro_onsen">就労　温泉清掃スタッフ・専門調理スタッフ</option>
        </optgroup>
      </select>
      <div class="info-box" id="hourly-preview" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label for="workHours">月間勤務時間の目安（時間）</label>
      <input type="number" id="workHours" min="1" max="171" value="80" placeholder="例：80">
      <div class="info-box">月収目安 ＝ 時給 × 月間勤務時間（通勤手当は別途）</div>
    </div>
  </div>

  <!-- ② 通勤手当 -->
  <div class="card">
    <h2>② 通勤手当（規定に準ずる）</h2>

    <div class="form-group">
      <label for="transportType">通勤手段</label>
      <select id="transportType" onchange="onTransportChange()">
        <option value="none">徒歩・自転車（交通費支給なし）</option>
        <option value="transit">電車・バス</option>
        <option value="car">車（距離区分）</option>
        <option value="bike">バイク（車の半額）</option>
      </select>
    </div>

    <div id="transport-transit" class="transport-detail">
      <div class="transport-row">
        <div class="form-group">
          <label for="transitCost">月額実費（円）</label>
          <input type="number" id="transitCost" min="0" max="100000" value="0" placeholder="例：5000">
        </div>
        <div class="form-group">
          <label for="transitCap">支給上限</label>
          <select id="transitCap">
            <option value="10000">10,000円</option>
            <option value="15000" selected>15,000円</option>
            <option value="20000">20,000円</option>
            <option value="999999">上限なし（実費全額）</option>
          </select>
        </div>
      </div>
      <div class="info-box">支給額 ＝ 月額実費と上限の低い方</div>
    </div>

    <div id="transport-car" class="transport-detail">
      <div class="form-group">
        <label for="carDistance">通勤距離</label>
        <select id="carDistance">
          <option value="0">片道2km未満（支給なし）</option>
          <option value="2100">片道2km〜5km未満（2,100円/月）</option>
          <option value="4200">片道5km〜10km未満（4,200円/月）</option>
          <option value="7100">片道10km〜15km未満（7,100円/月）</option>
          <option value="10000">片道15km〜20km未満（10,000円/月）</option>
          <option value="12900">片道20km〜25km未満（12,900円/月）</option>
          <option value="15800">片道25km〜30km未満（15,800円/月）</option>
        </select>
      </div>
      <div class="info-box">片道距離で選択してください。バイクは上記の半額を支給。</div>
    </div>
  </div>

  <button class="btn" onclick="calculate()">時給を算出する</button>

  <!-- 結果エリア -->
  <div class="card" id="result">
    <h2>算出結果</h2>

    <div class="result-total">
      <div class="label">採用時 時給目安</div>
      <div class="amount" id="totalHourly">¥0</div>
      <div class="sub">時給ベース（通勤手当除く）</div>
    </div>

    <div class="result-sub-total">
      <div class="label">月収目安（時給 × 月間勤務時間）</div>
      <div class="amount" id="monthlyEstimate">¥0</div>
    </div>

    <div class="breakdown">
      <div class="breakdown-row">
        <span class="key">基礎給与</span>
        <span class="val" id="br-base">¥0</span>
      </div>
      <div class="breakdown-row">
        <span class="key">資格手当</span>
        <span class="val plus" id="br-qual">+¥0</span>
      </div>
      <div class="breakdown-row">
        <span class="key">ベースアップ手当</span>
        <span class="val baseup" id="br-baseup">+¥0</span>
      </div>
      <div class="breakdown-row total-row">
        <span class="key">時給合計</span>
        <span class="val" id="br-hourly-total">¥0</span>
      </div>
      <div class="breakdown-row monthly-row">
        <span class="key">月収目安（× <span id="br-hours">0</span>時間）</span>
        <span class="val" id="br-monthly">¥0</span>
      </div>
      <div class="breakdown-row">
        <span class="key">通勤手当（月額）</span>
        <span class="val transport" id="br-transport">+¥0</span>
      </div>
      <div class="breakdown-row total-row">
        <span class="key">月収合計（目安）</span>
        <span class="val" id="br-total">¥0</span>
      </div>
    </div>

    <div class="range-note" id="rangeNote"></div>

    <button class="btn-reset" onclick="resetForm()">再計算する</button>
    <button class="btn" style="margin-top:12px;" onclick="window.print()">印刷・PDF保存</button>
  </div>

</div>

<script>
  // 基礎給与・資格手当・ベースアップ手当（1時間あたり）
  // ベースアップ手当は月額÷171をROUNDUPで算出
  const roundUp = (n) => Math.ceil(n);

  const JOBS = {
    // 介護職員（ベースアップ手当：19,000÷171=112円）
    kaigo_nq:       { base: 970,  qual: 0,                            bu: roundUp(19000/171), label: '介護職員　無資格' },
    kaigo_shoninsha:{ base: 1000, qual: roundUp(3000/171),            bu: roundUp(19000/171), label: '介護職員　初任者研修' },
    kaigo_jitsumu:  { base: 1000, qual: roundUp(5000/171),            bu: roundUp(19000/171), label: '介護職員　実務者研修' },
    kaigo_fukushi:  { base: 1000, qual: roundUp(10000/171),           bu: roundUp(19000/171), label: '介護職員　介護福祉士' },
    // 児童系職員（ベースアップ手当：19,000÷171=112円）
    jido_nq:        { base: 970,  qual: 0,                            bu: roundUp(19000/171), label: '児童系職員　無資格' },
    jido_ninyo:     { base: 1000, qual: roundUp(3000/171),            bu: roundUp(19000/171), label: '児童系職員　任用資格' },
    jido_kyoin:     { base: 1000, qual: roundUp(5000/171),            bu: roundUp(19000/171), label: '児童系職員　教職免許' },
    jido_hoiku:     { base: 1000, qual: roundUp(10000/171),           bu: roundUp(19000/171), label: '児童系職員　保育士' },
    // 事務系職員（ベースアップ手当：8,000÷171=47円）
    jimu_nq:        { base: 990,  qual: 0,                            bu: roundUp(8000/171),  label: '事務系職員　未経験' },
    jimu_3000:      { base: 1000, qual: roundUp(3000/171),            bu: roundUp(8000/171),  label: '事務系職員　3,000円資格' },
    jimu_5000:      { base: 1000, qual: roundUp(5000/171),            bu: roundUp(8000/171),  label: '事務系職員　5,000円資格' },
    jimu_10000:     { base: 1000, qual: roundUp(10000/171),           bu: roundUp(8000/171),  label: '事務系職員　10,000円資格' },
    // 専門職・その他（ベースアップ手当：10,000÷171=59円）
    rehab:          { base: 1150, qual: roundUp(5000/171),            bu: roundUp(10000/171), label: 'リハビリ系職員' },
    nurse:          { base: 1230, qual: roundUp(5000/171),            bu: roundUp(10000/171), label: '看護系職員' },
    chori:          { base: 970,  qual: 0,                            bu: roundUp(10000/171), label: '福祉厨房調理師・世話人' },
    shuro_hayaoso:  { base: 990,  qual: 0,                            bu: roundUp(10000/171), label: '就労　早出遅出等可能求人' },
    shuro_onsen:    { base: 1140, qual: 0,                            bu: roundUp(10000/171), label: '就労　温泉清掃スタッフ・専門調理スタッフ' },
  };

  document.getElementById('jobType').addEventListener('change', function() {
    const job = JOBS[this.value];
    const preview = document.getElementById('hourly-preview');
    if (job) {
      const total = job.base + job.qual + job.bu;
      preview.innerHTML = `基礎給与 ${job.base}円 ＋ 資格手当 ${job.qual}円 ＋ ベースアップ手当 ${job.bu}円 ＝ <strong>${total.toLocaleString('ja-JP')}円/時</strong>`;
      preview.style.display = '';
    } else {
      preview.style.display = 'none';
    }
  });

  function onTransportChange() {
    const val = document.getElementById('transportType').value;
    document.getElementById('transport-transit').classList.toggle('active', val === 'transit');
    const showCar = val === 'car' || val === 'bike';
    document.getElementById('transport-car').classList.toggle('active', showCar);
  }

  function getTransportAmount() {
    const type = document.getElementById('transportType').value;
    if (type === 'transit') {
      const cost = parseInt(document.getElementById('transitCost').value) || 0;
      const cap  = parseInt(document.getElementById('transitCap').value) || 15000;
      return Math.min(cost, cap);
    }
    if (type === 'car' || type === 'bike') {
      const base = parseInt(document.getElementById('carDistance').value) || 0;
      return type === 'bike' ? Math.floor(base / 2) : base;
    }
    return 0;
  }

  function fmt(n) { return '¥' + n.toLocaleString('ja-JP'); }

  function calculate() {
    const key = document.getElementById('jobType').value;
    if (!key) { alert('職種・資格区分を選択してください'); return; }

    const job        = JOBS[key];
    const workHours  = Math.max(1, parseInt(document.getElementById('workHours').value) || 80);
    const transport  = getTransportAmount();

    const hourlyTotal  = job.base + job.qual + job.bu;
    const monthlyBase  = hourlyTotal * workHours;
    const monthlyTotal = monthlyBase + transport;

    document.getElementById('br-base').textContent        = fmt(job.base);
    document.getElementById('br-qual').textContent        = '+' + fmt(job.qual);
    document.getElementById('br-baseup').textContent      = '+' + fmt(job.bu);
    document.getElementById('br-hourly-total').textContent = fmt(hourlyTotal);
    document.getElementById('br-hours').textContent       = workHours;
    document.getElementById('br-monthly').textContent     = fmt(monthlyBase);
    document.getElementById('br-transport').textContent   = '+' + fmt(transport);
    document.getElementById('br-total').textContent       = fmt(monthlyTotal);
    document.getElementById('totalHourly').textContent    = fmt(hourlyTotal);
    document.getElementById('monthlyEstimate').textContent = fmt(monthlyBase);

    const low  = fmt(Math.round(hourlyTotal * 0.95));
    const high = fmt(Math.round(hourlyTotal * 1.05));
    document.getElementById('rangeNote').innerHTML =
      `<strong>提示レンジ目安：</strong>${low} 〜 ${high}/時<br>` +
      `<span style="font-size:0.8rem;">※本人のスキル・面接評価により±5%の調整を推奨します。</span><br>` +
      `<span style="font-size:0.8rem;">※月収目安は実際の勤務時間・シフトにより変動します。</span>`;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('result').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
